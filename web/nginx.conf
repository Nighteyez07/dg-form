# Run worker processes as the unprivileged nginx user.
# SECURITY: Worker processes handle untrusted HTTP traffic; running them as a
# limited system account reduces the damage from any RCE in nginx itself.
user  nginx;

# Let nginx pick the optimal number of worker processes automatically.
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Gzip compression ──────────────────────────────────────────────────
    # Compress text-based assets to reduce transfer size for JS/CSS/HTML/JSON.
    # Binary formats (images, video) are excluded — they are already compressed.
    gzip  on;
    gzip_vary  on;
    gzip_proxied  any;
    gzip_comp_level  6;
    gzip_min_length  1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # SECURITY: Limit upload requests to 5 per minute per client IP to reduce
    # the risk of abuse / resource exhaustion on the video-processing endpoint.
    # The zone is sized at 10 MB, which can track ~160 000 unique IP addresses.
    limit_req_zone  $binary_remote_addr  zone=upload_limit:10m  rate=5r/m;

    server {
        listen  80;
        server_name  _;

        root  /usr/share/nginx/html;
        index  index.html;

        # ── Security headers ─────────────────────────────────────────────
        # SECURITY: Prevent MIME-type sniffing attacks where the browser
        # would execute a file as a different content type than declared.
        add_header  X-Content-Type-Options  "nosniff"  always;

        # SECURITY: Deny loading this page inside a frame/iframe to prevent
        # clickjacking attacks.
        add_header  X-Frame-Options  "DENY"  always;

        # SECURITY: Enable the browser's built-in XSS filter (legacy browsers).
        # Modern browsers rely on CSP instead, but this header covers older UAs.
        add_header  X-XSS-Protection  "1; mode=block"  always;

        # SECURITY: Content-Security-Policy restricts which sources the browser
        # will load resources from, significantly reducing the XSS attack surface.
        # blob: in media-src allows TrimEditor to use URL.createObjectURL() for
        # local video preview. 'unsafe-inline' in style-src is required for
        # Vite's CSS-in-JS output.
        add_header  Content-Security-Policy  "default-src 'self'; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none';"  always;

        # ── API reverse proxy ─────────────────────────────────────────────
        # Strip the leading /api prefix before forwarding to the FastAPI
        # service so that the backend routes are relative to its own root.
        # e.g. GET /api/health  →  GET /health on http://api:8000
        location /api/ {
            # SECURITY: Only the upstream service name is used here; it is
            # resolved via Docker's internal DNS — not reachable externally.
            proxy_pass         http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Allow large video uploads to pass through without nginx
            # buffering them entirely before forwarding.
            client_max_body_size  210m;
            proxy_request_buffering  off;

            # SECURITY: Apply the upload rate limit zone defined in the http
            # block. burst=3 allows brief spikes; nodelay returns 429
            # immediately rather than queuing excess requests.
            limit_req        zone=upload_limit  burst=3  nodelay;
            limit_req_status 429;
        }

        # ── SPA fallback ─────────────────────────────────────────────────
        # For any path that is not a real file/directory, serve index.html so
        # that the React router handles client-side navigation correctly.
        location / {
            try_files  $uri  $uri/  /index.html;
        }
    }
}
